 <script>
  // Hàm nạp Component có Callback để xử lý sau khi nạp xong
  function loadComponent(id, file, callback) {
    fetch(file)
      .then(response => {
        if (!response.ok) throw new Error("Không tìm thấy file: " + file);
        return response.text();
      })
      .then(data => {
        document.getElementById(id).innerHTML = data;
        // Nếu có hàm callback thì chạy nó
        if (callback) callback();
      })
      .catch(error => console.error('Lỗi:', error));
  }

  // Nạp Header và xử lý Menu Mobile
  loadComponent('header-placeholder', '/components/header.html', function() {
    const toggle = document.getElementById("menu-toggle");
    const nav = document.getElementById("navbar");
    
    if (toggle && nav) {
      toggle.addEventListener("click", function(e) {
        e.preventDefault(); // Ngăn chặn hành vi mặc định
        nav.classList.toggle("active"); // Mở/đóng menu
        toggle.classList.toggle("open"); // Hiệu ứng xoay nút 3 gạch (nếu có)
      });
    }
    
    // Xử lý hiệu ứng đổi màu Header khi cuộn trang
    window.addEventListener("scroll", () => {
      const headerElement = document.querySelector(".header");
      if(headerElement) {
        headerElement.classList.toggle("scrolled", window.scrollY > 50);
      }
    });
  });

  // Nạp các thành phần khác
  loadComponent('footer-placeholder', '/components/footer.html');
  loadComponent('buttons-placeholder', '/components/contact-buttons.html');
</script>
